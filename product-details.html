<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHHUTUP™ | Masterpiece Details</title>
    <meta name="description" content="View detailed specifications and order this SHHUTUP luxury timepiece. Premium craftsmanship, sapphire crystal, and free insured shipping.">
    <meta name="theme-color" content="#030303">

    <link rel="icon" href="https://ik.imagekit.io/nsyr92pse/file_000000004b4c7208916ebecb593f0b05.png" type="image/png">
    <link rel="apple-touch-icon" href="https://ik.imagekit.io/nsyr92pse/file_000000004b4c7208916ebecb593f0b05.png">

    <meta property="og:title" content="SHHUTUP™ | Masterpiece Details">
    <meta property="og:image" content="https://ik.imagekit.io/nsyr92pse/file_000000004b4c7208916ebecb593f0b05.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://ik.imagekit.io/nsyr92pse/file_000000004b4c7208916ebecb593f0b05.png">


    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Inter:wght@300;400;500&family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.css" />
</head>
<body>
    <nav class="navbar scrolled" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">SHHUTUP</a>
            <div class="nav-actions">
                <button class="nav-btn" onclick="window.location.href='index.html'" aria-label="Back to Home"><i class="fa-solid fa-arrow-left"></i></button>
                <button class="nav-btn" id="wishlist-toggle-btn" aria-label="Wishlist">
                    <i class="fa-regular fa-heart"></i><span class="badge" id="wishlist-count">0</span>
                </button>
                <button class="nav-btn" id="cart-toggle-btn" aria-label="Cart">
                    <i class="fa-solid fa-bag-shopping"></i><span class="badge bg-blue" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="product-details-section" style="padding-top: 120px;">
        <div class="details-container" id="details-container">
            <div style="text-align:center; width:100%; color:var(--text-muted);">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size:2rem; margin-bottom:10px; color:var(--luxury-blue);"></i>
                <p>Retrieving Masterpiece Details...</p>
            </div>
        </div>
    </section>

      <section class="recently-viewed-section" style="padding-bottom: 1.5rem; padding-top: 1rem; display: none;" id="recent-section">
        <div class="details-container">
            <h3 style="margin-bottom: 1.5rem; color:var(--text-primary); font-family:var(--font-heading); text-align:center; letter-spacing: 2px; font-size: 1rem;">RECENTLY VIEWED</h3>
            <div class="recent-grid" id="recent-grid"></div>
        </div>
    </section>

    <section class="more-products-section" style="padding-bottom: 4rem; padding-top: 1rem;">
        <div class="details-container">
            <div class="details-divider" style="margin-bottom: 2rem; background: var(--border-color); height: 1px;"></div>
            <h3 style="margin-bottom: 1.5rem; color:var(--text-primary); font-family:var(--font-heading); text-align:center; letter-spacing: 2px; font-size: 1.1rem;">DISCOVER MORE</h3>
            <div class="more-products-grid" id="more-products-grid"></div>
            
            <div id="lazy-loader" style="text-align: center; padding: 30px 0; display: none; color: var(--luxury-blue);">
                <i class="fa-solid fa-circle-notch fa-spin" style="font-size: 2rem;"></i>
            </div>
        </div>
    </section>


    <!-- Cart Drawer -->
    <div id="cart-drawer" class="cart-drawer">
        <div class="cart-drawer-overlay" id="cart-overlay"></div>
        <div class="cart-content-panel">
            <div class="cart-header">
                <h2>LUXURY TRAY (<span id="cart-items-count">0</span>)</h2>
                <button id="cart-close-btn" class="cart-close-btn" aria-label="Close Cart"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="cart-items-list" class="cart-items-list"></div>
            <div class="cart-footer">
                <div class="cart-subtotal-row"><span>Subtotal</span><span id="cart-subtotal-price" class="font-montserrat">₹0</span></div>
                <p class="shipping-note"><i class="fa-solid fa-truck"></i> Free Luxury Insured Shipping Applied</p>
                <button class="btn btn-whatsapp btn-block" id="details-whatsapp-btn"><i class="fa-brands fa-whatsapp"></i> ORDER ON WHATSAPP</button>
            </div>
        </div>
    </div>

    <!-- Wishlist Drawer -->
    <div id="wishlist-drawer" class="cart-drawer">
        <div class="cart-drawer-overlay" id="wishlist-overlay"></div>
        <div class="cart-content-panel">
            <div class="cart-header">
                <h2>YOUR WISHLIST (<span id="wishlist-drawer-count">0</span>)</h2>
                <button id="wishlist-close-btn" class="cart-close-btn" aria-label="Close Wishlist"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="wishlist-items-list" class="cart-items-list"></div>
        </div>
    </div>

    <!-- Back to Top -->
    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <i class="fa-solid fa-chevron-up"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/swiper@10/swiper-bundle.min.js"></script>
    <script type="module" src="js/product-details.js"></script>
</body>
</html>
